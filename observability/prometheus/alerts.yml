groups:
  - name: payment-slos
    rules:
      # ── LATENCY ────────────────────────────────────────────────────────────
      - alert: PaymentLatencyHigh
        expr: |
          histogram_quantile(0.99,
            sum(rate(http_request_duration_seconds_bucket{job="tch-payment-app"}[5m])) by (le, endpoint)
          ) > 0.5
        for: 3m
        labels:
          severity: warning
          signal: latency
        annotations:
          summary: "Payment p99 latency above 500ms on {{ $labels.endpoint }}"
          runbook: "https://wiki.tch.internal/runbooks/payment-latency"

      # ── ERRORS ─────────────────────────────────────────────────────────────
      - alert: PaymentErrorRateHigh
        expr: |
          sum(rate(http_requests_total{job="tch-payment-app", status_code=~"5.."}[5m]))
          /
          sum(rate(http_requests_total{job="tch-payment-app"}[5m])) > 0.001
        for: 2m
        labels:
          severity: critical
          signal: errors
        annotations:
          summary: "Payment 5xx error rate above SLO threshold (>0.1%)"
          runbook: "https://wiki.tch.internal/runbooks/payment-errors"

      - alert: SLOErrorBudgetBurning
        expr: |
          (
            1 - (
              sum(rate(http_requests_total{job="tch-payment-app", status_code=~"5.."}[1h]))
              /
              sum(rate(http_requests_total{job="tch-payment-app"}[1h]))
            )
          ) < 0.999
        for: 5m
        labels:
          severity: critical
          signal: slo
        annotations:
          summary: "SLO breach — payment success rate below 99.9%"
          description: "At this burn rate the monthly error budget will be exhausted in < 1 day."

      # ── TRAFFIC ────────────────────────────────────────────────────────────
      - alert: PaymentTrafficAnomaly
        expr: |
          sum(rate(http_requests_total{job="tch-payment-app"}[5m]))
          > 2 * sum(rate(http_requests_total{job="tch-payment-app"}[30m]))
        for: 2m
        labels:
          severity: warning
          signal: traffic
        annotations:
          summary: "Payment request rate 2× above 30-min baseline"

      # ── SATURATION ─────────────────────────────────────────────────────────
      - alert: PaymentServiceSaturated
        expr: http_requests_in_flight{job="tch-payment-app"} > 50
        for: 1m
        labels:
          severity: warning
          signal: saturation
        annotations:
          summary: "Payment service has >50 requests in-flight — may be saturated"
