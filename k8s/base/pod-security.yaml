# Enforce restricted pod security at namespace level
apiVersion: v1
kind: Namespace
metadata:
  name: payment-app
  labels:
    pod-security.kubernetes.io/enforce: restricted    # blocks privileged, root, hostNetwork
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/warn: restricted
---
# NetworkPolicy: default deny all, then whitelist
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: payment-app
spec:
  podSelector: {}
  policyTypes: [Ingress, Egress]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-app-to-db
  namespace: payment-app
spec:
  podSelector:
    matchLabels:
      app: payment-service
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: postgres
      ports:
        - port: 5432
