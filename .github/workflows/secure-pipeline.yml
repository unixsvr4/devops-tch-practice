name: Secure CI Pipeline

# Triggers on every push/PR to main.
# The deploy/dast/promote stages are stubs — they echo what a real pipeline
# would do without requiring external infrastructure (ArgoCD, ZAP, staging env).
# To enable manual approval on promote-prod: create a "production" environment
# in GitHub → Settings → Environments and add a required reviewer.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  IMAGE_NAME: tch-payment-app
  IMAGE_TAG: ${{ github.sha }}

jobs:
  # ── Stage 1: Lint + unit tests ──────────────────────────────────────────────
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r app/requirements.txt ruff pytest httpx

      - name: Lint — ruff
        run: ruff check app/ --ignore E501

      - name: Unit tests — pytest
        run: pytest app/tests/ -v --tb=short

  # ── Stage 2a: SAST (runs in parallel with build-scan) ───────────────────────
  sast:
    runs-on: ubuntu-latest
    needs: lint-test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install bandit
        run: pip install bandit

      - name: SAST — Bandit (medium+ severity, report-only)
        # --exit-zero: findings are reported but pipeline is not blocked.
        # Raise to exit-code 1 to enforce in a real engagement.
        run: bandit -r app/ -ll -q --exit-zero

  # ── Stage 2b: Docker build + Trivy CVE scan (parallel with sast) ────────────
  build-scan:
    runs-on: ubuntu-latest
    needs: lint-test
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: docker build -t $IMAGE_NAME:$IMAGE_TAG app/

      - name: Trivy — container CVE scan (CRITICAL/HIGH, report-only)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          format: table
          exit-code: 0           # set to 1 to block pipeline on critical CVEs
          severity: CRITICAL,HIGH
          ignore-unfixed: true

  # ── Stage 3: Deploy to staging (GitOps / ArgoCD stub) ───────────────────────
  deploy-staging:
    runs-on: ubuntu-latest
    needs: [sast, build-scan]
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to staging via ArgoCD (stub)
        run: |
          echo "▶ kustomize edit set image app=$IMAGE_NAME:$IMAGE_TAG"
          echo "▶ ArgoCD syncs automatically from git — zero manual kubectl"
          echo "✓ Staging deploy complete for $IMAGE_TAG"

  # ── Stage 4: DAST with OWASP ZAP (stub) ─────────────────────────────────────
  dast-zap:
    runs-on: ubuntu-latest
    needs: deploy-staging
    steps:
      - name: DAST — OWASP ZAP baseline scan (stub)
        run: |
          echo "▶ zaproxy/action-baseline would scan https://staging.tch-internal.com"
          echo "▶ Fails pipeline on medium+ findings in a real engagement"
          echo "✓ DAST scan complete for $IMAGE_TAG"

  # ── Stage 5: Promote to production (requires manual approval) ───────────────
  promote-prod:
    runs-on: ubuntu-latest
    needs: dast-zap
    # Uncomment 'environment: production' after creating the env in GitHub Settings
    # → Settings → Environments → New environment → add required reviewer
    # environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Promote to production (stub)
        run: |
          echo "▶ kustomize edit set image app=$IMAGE_NAME:$IMAGE_TAG"
          echo "▶ ArgoCD picks up the git change and rolls out to prod"
          echo "✓ Production promotion complete for $IMAGE_TAG"
