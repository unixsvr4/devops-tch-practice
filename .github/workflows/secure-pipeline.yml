name: Secure CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}/app
  IMAGE_TAG: ${{ github.sha }}

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run linter
        run: echo "run your linter here (flake8, eslint, etc.)"
      - name: Run unit tests
        run: echo "pytest / npm test"

  sast-sonarqube:
    runs-on: ubuntu-latest
    needs: lint-test
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: SonarQube Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.qualitygate.wait=true
            -Dsonar.projectKey=tch-app

  build-scan:
    runs-on: ubuntu-latest
    needs: sast-sonarqube
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t $IMAGE_NAME:$IMAGE_TAG .

      - name: Trivy image scan (CRITICAL = fail)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          format: table
          exit-code: 1                    # blocks pipeline on critical CVE
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Push to GHCR
        run: |
          echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          docker push $IMAGE_NAME:$IMAGE_TAG

  deploy-staging:
    runs-on: ubuntu-latest
    needs: build-scan
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to staging via ArgoCD
        run: |
          # Update image tag in kustomize overlay — ArgoCD picks this up
          cd k8s/overlays/staging
          kustomize edit set image app=$IMAGE_NAME:$IMAGE_TAG
          git config user.email "ci@tch.com"
          git config user.name "CI Bot"
          git add . && git commit -m "deploy: staging $IMAGE_TAG" && git push

  dast-zap:
    runs-on: ubuntu-latest
    needs: deploy-staging
    steps:
      - name: OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.10.0
        with:
          target: 'https://staging.app.tch-internal.com'
          fail_action: true               # blocks on medium+ findings

  promote-prod:
    runs-on: ubuntu-latest
    needs: dast-zap
    environment: production              # requires manual approval in GitHub
    steps:
      - uses: actions/checkout@v4
      - name: Promote to prod
        run: |
          cd k8s/overlays/prod
          cd k8s/overlays/prod
          kustomize edit set image app=$IMAGE_NAME:$IMAGE_TAG
          git add . && git commit -m "deploy: prod $IMAGE_TAG" && git push
